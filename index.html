<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomor Pembayaran</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">

        <!-- JUDUL ATAS -->
        <h1>Ini No Rekening Saya</h1>

        <p class="subtitle">
            Silakan gunakan salah satu metode pembayaran di bawah ini
        </p>

        <!-- CARD PAYMENT -->
        <div class="card-container">

            {% for name, number in payments.items() %}
            <div class="card">
                <h2>{{ name }}</h2>

                <div class="number-box">
                    <span id="num{{ loop.index }}">{{ number }}</span>
                </div>

                <button onclick="copyText('num{{ loop.index }}')">
                    Salin Nomor
                </button>
            </div>
            {% endfor %}

        </div>

        <!-- FOOTER -->
        <div class="footer-text">
            <p><b>Terima kasih 🙏</b></p>
            <p>Silakan konfirmasi ulang ke saya untuk memastikan transaksi Anda berhasil.</p>
        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
